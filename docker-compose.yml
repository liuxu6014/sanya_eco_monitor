services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanya-eco-backend
    ports:
      - "8888:8888"
    volumes:
      - ./backend/sanya_eco.db:/app/sanya_eco.db
      - ./backend/data:/app/data
      - ./logs/backend:/app/logs
    env_file:
      - ./backend/.env
    environment:
      LOG_DIR: /app/logs
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanya-eco-frontend
    ports:
      - "5188:80"
    volumes:
      - ./logs/frontend:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: sanya-eco-network
